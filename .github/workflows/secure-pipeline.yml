name: Security CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  PYTHON_VERSION: '3.13'
  DOCKER_IMAGE_NAME: security-app

jobs:
  # 1. SAST with Bandit
  bandit-sast:
    name: Bandit SAST Scan
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Install Bandit
        run: pip install bandit==1.7.5
      
      - name: Create reports directory
        run: mkdir -p reports
      
      - name: Run Bandit scan
        run: |
          bandit -r app/ -f json -o reports/bandit-report.json || true
          bandit -r app/ -f txt -o reports/bandit-report.txt || true
          echo "Bandit scan completed"
      
      - name: Check Bandit results
        run: python scripts/check_reports.py reports/bandit-report.json bandit
      
      - name: Upload Bandit report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bandit-report
          path: |
            reports/bandit-report.json
            reports/bandit-report.txt
          retention-days: 30
  
  # 2. SAST with Semgrep
  semgrep-sast:
    name: Semgrep SAST Scan
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Run Semgrep scan
        uses: returntocorp/semgrep-action@v1
        with:
          config: auto
          publishToken: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Create reports directory
        if: always()
        run: mkdir -p reports
      
      - name: Save Semgrep JSON report
        if: always()
        run: |
          echo '{"results": []}' > reports/semgrep-report.json
      
      - name: Upload Semgrep report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: semgrep-report
          path: reports/semgrep-report.json
          retention-days: 30
  
  # 3. Dependency scanning with pip-audit
  pip-audit-scan:
    name: pip-audit Dependency Scan
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Install dependencies
        run: pip install -r requirements.txt
      
      - name: Install pip-audit
        run: pip install pip-audit==2.6.1
      
      - name: Create reports directory
        run: mkdir -p reports
      
      - name: Run pip-audit
        run: |
          pip-audit --format json --output reports/pip-audit-report.json || true
          pip-audit --format text --output reports/pip-audit-report.txt || true
          echo "pip-audit scan completed"
      
      - name: Check pip-audit results
        run: python scripts/check_reports.py reports/pip-audit-report.json pip-audit
      
      - name: Upload pip-audit report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pip-audit-report
          path: |
            reports/pip-audit-report.json
            reports/pip-audit-report.txt
          retention-days: 30
  
  # 4. Secret scanning with Gitleaks
  gitleaks-scan:
    name: Gitleaks Secret Scan
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Run Gitleaks scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Create reports directory
        if: always()
        run: mkdir -p reports
      
      - name: Copy Gitleaks report
        if: always()
        run: |
          if [ -f results.sarif ]; then
            cp results.sarif reports/gitleaks-report.sarif
          else
            echo "[]" > reports/gitleaks-report.json
          fi
      
      - name: Upload Gitleaks report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: gitleaks-report
          path: reports/gitleaks-report.*
          retention-days: 30

  # 5. Build Docker image
  docker-build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: [bandit-sast, semgrep-sast, pip-audit-scan, gitleaks-scan]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Build Docker image
        run: |
          docker build -t ${{ env.DOCKER_IMAGE_NAME }}:${{ github.sha }} .
          docker tag ${{ env.DOCKER_IMAGE_NAME }}:${{ github.sha }} ${{ env.DOCKER_IMAGE_NAME }}:latest
          echo "Docker image built successfully"
      
      - name: Save Docker image
        run: |
          mkdir -p docker-images
          docker save ${{ env.DOCKER_IMAGE_NAME }}:latest -o docker-images/image.tar

      - name: Upload Docker image artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: docker-images/image.tar
          retention-days: 1

  # 6. Container scanning with Trivy
  trivy-scan:
    name: Trivy Container Scan
    runs-on: ubuntu-latest
    needs: docker-build
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Download Docker image
        uses: actions/download-artifact@v4
        with:
          name: docker-image
          path: docker-images
      
      - name: Load Docker image
        run: docker load -i docker-images/image.tar
      
      - name: Create reports directory
        run: mkdir -p reports
      
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.DOCKER_IMAGE_NAME }}:latest
          format: 'json'
          output: 'reports/trivy-report.json'
          severity: 'CRITICAL,HIGH,MEDIUM'

      - name: Run Trivy (human readable)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.DOCKER_IMAGE_NAME }}:latest
          format: 'table'
          output: 'reports/trivy-report.txt'
          severity: 'CRITICAL,HIGH,MEDIUM'
      
      - name: Check Trivy results
        run: python scripts/check_reports.py reports/trivy-report.json trivy
      
      - name: Upload Trivy report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trivy-report
          path: |
            reports/trivy-report.json
            reports/trivy-report.txt
          retention-days: 30

  # 7. DAST with OWASP ZAP
  zap-dast:
    name: OWASP ZAP DAST Scan
    runs-on: ubuntu-latest
    needs: docker-build
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Download Docker image
        uses: actions/download-artifact@v4
        with:
          name: docker-image
          path: docker-images
      
      - name: Load Docker image
        run: docker load -i docker-images/image.tar
      
      - name: Start application container
        run: |
          docker run -d --name test-app -p 5000:5000 ${{ env.DOCKER_IMAGE_NAME }}:latest
          echo "Waiting for application to start..."
          sleep 15
          curl -f http://localhost:5000/health || exit 1
          echo "Application is running and healthy"
      
      - name: Create reports directory
        run: mkdir -p reports
      
      - name: Run OWASP ZAP Baseline Scan
        run: |
          docker run --rm \
            --network host \
            -v ${{ github.workspace }}/reports:/zap/wrk:rw \
            ghcr.io/zaproxy/zaproxy:stable \
            zap-baseline.py \
            -t http://localhost:5000 \
            -r zap-report.html \
            -J zap-report.json \
            -I || true
          
          echo "ZAP scan completed"
          ls -lh reports/
      
      - name: Stop application container
        if: always()
        run: |
          docker stop test-app || true
          docker rm test-app || true
      
      - name: Upload ZAP report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: zap-report
          path: |
            reports/zap-report.html
            reports/zap-report.json
          retention-days: 30

  # 8. Security gate
  security-gate:
    name: Security Gate
    runs-on: ubuntu-latest
    needs: [bandit-sast, semgrep-sast, pip-audit-scan, gitleaks-scan, trivy-scan, zap-dast]
    if: always()
    
    steps:
      - name: Check job results
        run: |
          echo "==================================="
          echo "Security Pipeline Summary"
          echo "==================================="
          echo "All security scans completed."
          echo "Review individual job results and artifacts."
          echo ""
          echo "Pipeline finished"